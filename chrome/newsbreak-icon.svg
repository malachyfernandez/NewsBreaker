<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient - blue to purple -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a5298;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e57c2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary gradient - orange to red for breaking effect -->
    <linearGradient id="breakGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#feca57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9ff3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow gradient -->
    <radialGradient id="shadowGradient">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="64" cy="64" r="60" fill="url(#primaryGradient)" opacity="0.1"/>
  
  <!-- Main newspaper shape - made much larger -->
  <g transform="translate(64, 64)">
    <!-- Newspaper base - increased from 48x40 to 80x70 -->
    <rect x="-40" y="-35" width="80" height="70" rx="4" fill="url(#primaryGradient)" opacity="0.9"/>
    
    <!-- Newspaper fold line -->
    <line x1="-40" y1="-10" x2="40" y2="-10" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Text lines on newspaper - larger and more visible -->
    <rect x="-32" y="-28" width="64" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="-32" y="-22" width="48" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="-18" width="56" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="-14" width="40" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="-10" width="52" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    
    <rect x="-32" y="0" width="64" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="-32" y="6" width="52" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="11" width="60" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="16" width="44" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="21" width="56" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="-32" y="26" width="48" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    
    <!-- Breaking crack effect - more prominent -->
    <g opacity="0.9">
      <!-- Main crack line - thicker -->
      <path d="M -35,-25 L -15,-8 L -25,8 L -8,25 L 10,18 L 18,25 L 35,8" 
            stroke="url(#breakGradient)" 
            stroke-width="4" 
            fill="none" 
            stroke-linecap="round"
            stroke-linejoin="round"/>
      
      <!-- Crack fragments - larger -->
      <path d="M -15,-8 L -11,-14 L -19,-14 Z" fill="url(#breakGradient)" opacity="0.7"/>
      <path d="M -8,25 L -4,18 L -12,18 Z" fill="url(#breakGradient)" opacity="0.7"/>
      <path d="M 10,18 L 14,12 L 6,12 Z" fill="url(#breakGradient)" opacity="0.7"/>
      
      <!-- Small crack lines - more visible -->
      <line x1="-25" y1="-2" x2="-20" y2="6" stroke="url(#breakGradient)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="12" x2="6" y2="20" stroke="url(#breakGradient)" stroke-width="2" opacity="0.6"/>
      <line x1="15" y1="5" x2="20" y2="10" stroke="url(#breakGradient)" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- Breaking through effect - light rays - more prominent -->
    <g opacity="0.7">
      <line x1="0" y1="0" x2="25" y2="-35" stroke="url(#breakGradient)" stroke-width="3" opacity="0.5"/>
      <line x1="0" y1="0" x2="-30" y2="-25" stroke="url(#breakGradient)" stroke-width="3" opacity="0.5"/>
      <line x1="0" y1="0" x2="35" y2="20" stroke="url(#breakGradient)" stroke-width="3" opacity="0.5"/>
      <line x1="0" y1="0" x2="-25" y2="30" stroke="url(#breakGradient)" stroke-width="3" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Subtle shadow -->
  <ellipse cx="64" cy="110" rx="40" ry="8" fill="url(#shadowGradient)"/>
</svg>
